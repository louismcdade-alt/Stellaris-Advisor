<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stellaris Live Advisor</title>
<style>
  :root {
    --bg: #05070f; --panel: rgba(16,24,48,.72); --panel2: rgba(19,31,61,.72);
    --line: rgba(70,110,200,.22); --text: #d3e2ff; --muted: #8197c6;
    --accent: #46c6ff; --accent2: #6a7bff; --accent-rgb: 70,198,255;
    --gold: #ffd166; --gold-rgb: 255,209,102;
    --crit: #ff5b6e; --warn: #ffb454; --info: #5fa8ff; --good: #46e0a0;
    --cat-economy:#46e0a0; --cat-military:#ff7a8a; --cat-economy2:#46e0a0;
    --cat-diplomacy:#c98cff; --cat-research:#46c6ff; --cat-expansion:#ffd166;
    --cat-progression:#8be9fd; --cat-identity:#ffb454; --cat-origin:#9af0c0;
    --cat-civics:#9ab8ff; --cat-ascension:#e08bff;
    --cut: 14px; /* corner-cut size for the angular Stellaris panel chrome */
  }
  * { box-sizing: border-box; }
  html,body { height:100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text); min-height: 100vh;
    font: 15px/1.5 "Segoe UI", system-ui, sans-serif; overflow-x: hidden;
  }
  #stars { position: fixed; inset: 0; z-index: -2; display:block; }
  #nebula { position: fixed; inset: -20%; z-index: -3;
    background:
      radial-gradient(900px 600px at 78% -8%, rgba(40,70,150,.55), transparent 60%),
      radial-gradient(700px 700px at 12% 110%, rgba(90,40,130,.40), transparent 60%),
      radial-gradient(600px 500px at 50% 50%, rgba(20,40,90,.30), transparent 70%);
    animation: drift 40s ease-in-out infinite alternate; }
  @keyframes drift { from{transform:translate(-2%, -1%) scale(1);} to{transform:translate(2%,1%) scale(1.08);} }

  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 14px 22px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(8,12,26,.85), rgba(8,12,26,.55));
    position: sticky; top: 0; z-index: 5; backdrop-filter: blur(10px);
  }
  header::before, header::after { content:""; position:absolute; top:6px; width:18px; height:18px;
    border-top: 2px solid rgba(var(--gold-rgb),.65); pointer-events:none; }
  header::before { left:6px; border-left: 2px solid rgba(var(--gold-rgb),.65); }
  header::after { right:6px; border-right: 2px solid rgba(var(--gold-rgb),.65); }
  header .logo { flex: none; filter: drop-shadow(0 0 9px rgba(var(--accent-rgb),.45)); }
  header h1 { font-size: 17px; margin: 0; letter-spacing: 1.5px; font-weight: 700; }
  header h1 .lit { color: var(--accent); text-shadow: 0 0 18px rgba(var(--accent-rgb),.7); }
  .empire { color: var(--accent); font-weight: 700; }
  .profile { color: #2a1d00; font-size: 11.5px; font-weight: 700; padding: 3px 12px;
    clip-path: polygon(8px 0, 100% 0, 100% 100%, 0 100%, 0 8px);
    background: linear-gradient(90deg,var(--gold),#ffe9b3);
    box-shadow: 0 0 14px rgba(var(--gold-rgb),.4); cursor: default; }
  .profile.empty { display: none; }
  .date { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; }
  .spacer { margin-left: auto; }
  select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 6px 10px; font: inherit; font-size: 13px; cursor: pointer;
    max-width: 280px; transition: border-color .2s, box-shadow .2s;
  }
  select:hover { border-color: var(--accent); box-shadow: 0 0 12px rgba(var(--accent-rgb),.25); }
  .status { color: var(--muted); font-size: 12.5px; display:flex; align-items:center; gap:6px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--good);
    box-shadow: 0 0 0 0 rgba(70,224,160,.7); animation: pulse 2s infinite; }
  @keyframes pulse {
    0%{box-shadow:0 0 0 0 rgba(70,224,160,.6);} 70%{box-shadow:0 0 0 7px rgba(70,224,160,0);}
    100%{box-shadow:0 0 0 0 rgba(70,224,160,0);} }

  .grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 18px; padding: 18px 22px; max-width: 1480px; }
  @media (max-width: 1040px){ .grid { grid-template-columns: 1fr; } }
  .col { display: flex; flex-direction: column; gap: 16px; }
  section { position: relative; background: var(--panel); border: 1px solid var(--line);
    clip-path: polygon(0 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)));
    overflow: hidden; backdrop-filter: blur(8px);
    box-shadow: 0 8px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04); }
  section::after { content:""; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(100deg, transparent 40%, rgba(var(--accent-rgb),.08) 48%,
      rgba(var(--accent-rgb),.08) 52%, transparent 60%);
    background-size: 260% 100%; background-position: 130% 0;
    animation: scansweep 9s ease-in-out infinite; }
  @keyframes scansweep { 0%,80%{background-position: 130% 0;} 95%,100%{background-position: -30% 0;} }
  section > h2 { margin: 0; padding: 11px 16px; font-size: 12px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); border-bottom: 1px solid var(--line);
    display:flex; align-items:center; gap:8px; }
  section > h2 .count { margin-left:auto; color: var(--accent); font-size: 11px; }
  .advice { padding: 10px 12px; min-height: 60px; }
  .scan-flash { animation: scanflash 1s ease; }
  @keyframes scanflash { from{ box-shadow: inset 0 0 40px rgba(var(--accent-rgb),.35);}
    to{ box-shadow: inset 0 0 0 rgba(var(--accent-rgb),0);} }

  .card { position: relative; border-left: 4px solid var(--info); background: var(--panel2);
    border-radius: 9px; padding: 10px 14px; margin: 9px 0; overflow: hidden;
    animation: cardin .5s cubic-bezier(.2,.8,.2,1) backwards; }
  @keyframes cardin { from{opacity:0; transform: translateY(10px) scale(.985);} to{opacity:1; transform:none;} }
  .card::after { content:""; position:absolute; inset:0 0 0 0; pointer-events:none;
    background: linear-gradient(90deg, rgba(255,255,255,.06), transparent 40%); opacity:0;
    transition: opacity .3s; }
  .card:hover::after { opacity:1; }
  .card.critical { border-color: var(--crit); animation: cardin .5s backwards, glowcrit 1.8s ease-in-out infinite; }
  @keyframes glowcrit { 0%,100%{box-shadow:0 0 0 0 rgba(255,91,110,0);} 50%{box-shadow:0 0 18px 0 rgba(255,91,110,.35);} }
  .card.warning  { border-color: var(--warn); }
  .card.info     { border-color: var(--info); }
  .card.good     { border-color: var(--good); }
  .card .top { display: flex; align-items: center; gap: 9px; }
  .card .title { font-weight: 600; }
  .badge { font-size: 9.5px; text-transform: uppercase; letter-spacing: .5px;
    padding: 2px 8px; border-radius: 20px; color: #06101f; font-weight: 800; flex:none; }
  .badge.critical { background: var(--crit); } .badge.warning { background: var(--warn); }
  .badge.info { background: var(--info); } .badge.good { background: var(--good); }
  .cat { margin-left: auto; font-size: 10.5px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; padding-left: 8px; border-left: 2px solid var(--catc, var(--line)); }
  .card .detail { color: #aebede; font-size: 13.5px; margin-top: 5px; }

  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 7px 16px; text-align: left; font-variant-numeric: tabular-nums; }
  th { color: var(--muted); font-weight: 500; font-size: 11.5px; text-transform: uppercase; letter-spacing: .5px; }
  tr + tr td { border-top: 1px solid var(--line); }
  tbody tr { animation: rowin .4s ease backwards; transition: background .15s; }
  tbody tr:hover td { background: rgba(var(--accent-rgb),.07); }
  @keyframes rowin { from{opacity:0; transform:translateX(-6px);} to{opacity:1;} }
  .num { text-align: right; }
  .pos { color: var(--good); } .neg { color: var(--crit); } .zero { color: var(--muted); }
  .bar { height: 7px; background: rgba(8,14,32,.8); border-radius: 5px; overflow: hidden; }
  .bar > span { display: block; height: 100%; border-radius:5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    box-shadow: 0 0 10px rgba(var(--accent-rgb),.5); width:0; transition: width .9s cubic-bezier(.2,.8,.2,1); }
  .you td { background: rgba(var(--accent-rgb),.10); }
  tr.you:hover td { background: rgba(var(--accent-rgb),.18); }
  .you .name { color: var(--accent); font-weight: 700; }
  .you .bar > span { background: linear-gradient(90deg, var(--good), var(--accent)); }
  .flash { animation: flash 1s ease; }
  @keyframes flash { from{ background: rgba(var(--accent-rgb),.25);} to{ background: transparent;} }

  .empty { padding: 36px; text-align: center; color: var(--muted); }
  .err { color: var(--warn); }
  footer { padding: 8px 22px 22px; color: var(--muted); font-size: 12px; }

  /* Tabs */
  .tabs { display:flex; gap:8px; padding: 12px 22px 0; }
  .tab { position: relative; background: var(--panel2); color: var(--muted); border: 1px solid var(--line);
    border-bottom: none; clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
    padding: 9px 18px; font: inherit;
    font-size: 14px; cursor: pointer; transition: color .2s, background .2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); background: var(--panel); font-weight: 600;
    box-shadow: 0 -2px 14px rgba(var(--accent-rgb),.18); }
  .tab.active::after { content:""; position:absolute; left:10px; right:10px; bottom:0; height:2px;
    background: linear-gradient(90deg, var(--gold), var(--accent)); }

  /* Empire Builder */
  .builder-head { display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding: 16px 22px 4px; }
  .goalfilter { display:flex; gap:7px; flex-wrap:wrap; }
  .gbtn { background: var(--panel2); color: var(--muted); border: 1px solid var(--line);
    border-radius: 20px; padding: 5px 14px; font: inherit; font-size: 12.5px; cursor: pointer;
    transition: all .15s; }
  .gbtn:hover { color: var(--text); border-color: var(--accent); }
  .gbtn.active { background: linear-gradient(90deg,var(--accent),var(--accent2)); color:#06101f;
    font-weight:700; border-color: transparent; }
  .builder-dlc { margin-left:auto; color: var(--muted); font-size: 12px; }
  .builder-dlc b { color: var(--good); }
  .builds { display:grid; grid-template-columns: repeat(auto-fill, minmax(330px,1fr));
    gap: 16px; padding: 14px 22px 26px; }
  .build { background: var(--panel); border:1px solid var(--line);
    clip-path: polygon(0 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)));
    overflow:hidden; backdrop-filter: blur(8px); animation: cardin .5s backwards;
    box-shadow: 0 8px 26px rgba(0,0,0,.32); display:flex; flex-direction:column; }
  .build-top { display:flex; align-items:center; gap:8px; padding: 13px 16px 8px; }
  .build-name { font-weight:700; font-size:15.5px; color: var(--text); }
  .dlcbadge { margin-left:auto; font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; padding:3px 9px; border-radius: 20px; color:#06101f;
    background: linear-gradient(90deg,#9af0c0,#46e0a0); }
  .dlcbadge.dlc { background: linear-gradient(90deg,#e08bff,#c98cff); }
  .gchips { display:flex; gap:5px; flex-wrap:wrap; padding: 0 16px 10px; }
  .gchip { font-size:10.5px; color: var(--accent); border:1px solid var(--line);
    border-radius: 20px; padding: 2px 9px; background: rgba(var(--accent-rgb),.08); }
  .build table { width:100%; border-collapse:collapse; }
  .build td, .build th { padding: 6px 16px; vertical-align: top; font-size: 13px; }
  .build th { color: var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.5px;
    font-size: 10.5px; width: 86px; text-align:left; white-space:nowrap; }
  .build tr + tr td, .build tr + tr th { border-top: 1px solid var(--line); }
  .build td b { color: var(--accent); font-weight:600; }
  .why { margin: 10px 16px 16px; padding: 11px 13px; background: var(--panel2);
    border-left: 3px solid var(--good); border-radius: 8px; color:#aebede; font-size: 13px; }
  .vbadge { margin: 0 16px 14px; font-size: 12px; padding: 6px 11px; border-radius: 8px; }
  .vbadge.ok { color: var(--good); background: rgba(70,224,160,.08);
    border: 1px solid rgba(70,224,160,.30); }
  .vbadge.bad { color: var(--warn); background: rgba(255,180,84,.08);
    border: 1px solid rgba(255,180,84,.35); }

  /* Fleet manager */
  .fleet-head { padding: 16px 22px 4px; max-width: 760px; }
  .fleet-head .doctrine { background: var(--panel); border:1px solid var(--line);
    border-left: 3px solid var(--accent); border-radius: 12px; padding: 13px 16px;
    color: var(--text); font-size: 14px; }
  .fleet-head .stat { color: var(--muted); font-size: 12.5px; margin-top: 8px; }
  .fleet-head .stat b { color: var(--accent); }
  .fleetcard { padding: 0; }
  .ftable { width:100%; border-collapse: collapse; }
  .ftable th, .ftable td { padding: 9px 16px; text-align:left; font-variant-numeric: tabular-nums; }
  .ftable th { color: var(--muted); font-size: 11px; text-transform:uppercase; letter-spacing:.5px;
    border-bottom: 1px solid var(--line); }
  .ftable td.n { text-align:right; }
  .ftable tr + tr td { border-top: 1px solid var(--line); }
  .ftable .hull { font-weight:600; text-transform:capitalize; }
  .act { font-weight:700; font-size:12.5px; }
  .act.build { color: var(--good); } .act.cut { color: var(--warn); } .act.ok { color: var(--muted); }
  .recbar { height:6px; background: rgba(8,14,32,.8); border-radius:4px; overflow:hidden; margin-top:4px; }
  .recbar > span { display:block; height:100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); }
</style>
</head>
<body>
  <div id="nebula"></div>
  <canvas id="stars"></canvas>

  <header>
    <svg class="logo" width="40" height="40" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stellaris Advisor logo">
      <defs>
        <radialGradient id="lgbg" cx="50%" cy="38%" r="75%">
          <stop offset="0%" stop-color="#16233f"/><stop offset="55%" stop-color="#0b1326"/><stop offset="100%" stop-color="#060a16"/>
        </radialGradient>
        <radialGradient id="lgcore" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff6e0"/><stop offset="22%" stop-color="#ffe09a"/><stop offset="55%" stop-color="#ffb347"/><stop offset="100%" stop-color="#ff8a3c" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="lgring" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3ee0ff"/><stop offset="50%" stop-color="#5ad0ff" stop-opacity="0.55"/><stop offset="100%" stop-color="#2a7dff"/>
        </linearGradient>
        <linearGradient id="lgframe" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#5fe6ff"/><stop offset="100%" stop-color="#1f6bd6"/>
        </linearGradient>
        <filter id="lgsoft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="lgglow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10"/></filter>
      </defs>
      <circle cx="256" cy="256" r="242" fill="url(#lgbg)"/>
      <g fill="#bfe8ff">
        <circle cx="120" cy="150" r="2" opacity="0.8"/><circle cx="395" cy="135" r="1.6" opacity="0.6"/><circle cx="420" cy="300" r="2.2" opacity="0.7"/><circle cx="100" cy="350" r="1.6" opacity="0.6"/>
        <circle cx="360" cy="395" r="1.8" opacity="0.7"/><circle cx="150" cy="410" r="1.4" opacity="0.5"/><circle cx="440" cy="210" r="1.4" opacity="0.5"/><circle cx="80" cy="240" r="1.6" opacity="0.6"/>
      </g>
      <g fill="none" stroke="url(#lgring)" stroke-width="3">
        <ellipse cx="256" cy="256" rx="168" ry="66" transform="rotate(-24 256 256)" opacity="0.9"/>
        <ellipse cx="256" cy="256" rx="150" ry="150" opacity="0.45"/>
        <ellipse cx="256" cy="256" rx="172" ry="78" transform="rotate(58 256 256)" opacity="0.65"/>
      </g>
      <g filter="url(#lgsoft)"><circle cx="396" cy="206" r="8" fill="#7fe9ff"/><circle cx="128" cy="318" r="6" fill="#4fb8ff"/><circle cx="316" cy="378" r="5" fill="#9af0ff"/></g>
      <circle cx="256" cy="256" r="96" fill="url(#lgcore)" filter="url(#lgglow)" opacity="0.9"/>
      <g filter="url(#lgsoft)">
        <path d="M256 168 C262 222 290 250 344 256 C290 262 262 290 256 344 C250 290 222 262 168 256 C222 250 250 222 256 168 Z" fill="url(#lgcore)"/>
        <circle cx="256" cy="256" r="26" fill="#fff7e6"/>
      </g>
      <circle cx="256" cy="256" r="242" fill="none" stroke="url(#lgframe)" stroke-width="6"/>
      <circle cx="256" cy="256" r="230" fill="none" stroke="#2a89d6" stroke-width="1.5" opacity="0.5"/>
      <g stroke="#5fe6ff" stroke-width="3" stroke-linecap="round" opacity="0.85">
        <line x1="256" y1="20" x2="256" y2="38"/><line x1="256" y1="474" x2="256" y2="492"/><line x1="20" y1="256" x2="38" y2="256"/><line x1="474" y1="256" x2="492" y2="256"/>
      </g>
    </svg>
    <h1>STELLARIS <span class="lit">LIVE ADVISOR</span></h1>
    <span class="empire" id="empire">—</span>
    <span class="profile empty" id="profile"></span>
    <span class="date">⟢ <span id="date">—</span></span>
    <span class="spacer"></span>
    <select id="campaign" title="Choose which game to watch">
      <option value="">Auto — newest save</option>
    </select>
    <span class="status"><span class="dot" id="dot"></span><span id="status">connecting…</span></span>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="live">📡 Live Advisor</button>
    <button class="tab" data-view="fleet">🚀 Fleet Manager</button>
    <button class="tab" data-view="builder">🧬 Empire Builder</button>
  </div>

  <div id="view-fleet" style="display:none">
    <div class="fleet-head" id="fleethead"></div>
    <div class="builds" id="fleetbody" style="grid-template-columns:1fr;max-width:760px">
      <div class="empty">Analyzing your fleet…</div>
    </div>
  </div>

  <div id="view-builder" style="display:none">
    <div class="builder-head">
      <div class="goalfilter" id="goalfilter"></div>
      <div class="builder-dlc" id="builderdlc"></div>
    </div>
    <div class="builds" id="builds"><div class="empty">Loading builds…</div></div>
  </div>

  <div id="view-live">
  <div class="grid">
    <div class="col">
      <section>
        <h2>Recommendations <span class="count" id="advcount"></span></h2>
        <div class="advice" id="advice"><div class="empty">Waiting for save data…</div></div>
      </section>
      <section id="ascsection" style="display:none">
        <h2>✦ Ascension &amp; Traditions <span class="count" id="asccount"></span></h2>
        <div class="advice" id="ascension"></div>
      </section>
    </div>
    <div class="col">
      <section>
        <h2>Resources &amp; Net Flow</h2>
        <table id="restable"><tbody></tbody></table>
      </section>
      <section>
        <h2>Empire Power — Military</h2>
        <table id="powertable"><tbody></tbody></table>
      </section>
      <section>
        <h2>Empire Power — Economy</h2>
        <table id="econpowertable"><tbody></tbody></table>
      </section>
      <section>
        <h2>Empire Power — Technology</h2>
        <table id="techpowertable"><tbody></tbody></table>
      </section>
    </div>
  </div>
  </div><!-- /view-live -->
  <footer id="foot">Polling for the most recent autosave every 5 seconds.</footer>

<script>
// ---- Starfield ----
const canvas = document.getElementById("stars"), ctx = canvas.getContext("2d");
let stars = [];
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight;
  stars = Array.from({length: Math.min(160, Math.round(innerWidth*innerHeight/9000))}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    z: Math.random()*0.8+0.2, t: Math.random()*Math.PI*2 })); }
addEventListener("resize", resize); resize();
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const s of stars){
    s.t += 0.02*s.z; const tw = 0.5 + 0.5*Math.sin(s.t);
    s.y += 0.06*s.z; if(s.y > canvas.height) s.y = 0;
    ctx.globalAlpha = (0.25 + 0.75*tw) * s.z;
    ctx.fillStyle = s.z > 0.75 ? "#bcd6ff" : "#6f86c0";
    const r = s.z*1.5; ctx.fillRect(s.x, s.y, r, r);
  }
  ctx.globalAlpha = 1; requestAnimationFrame(drawStars);
}
drawStars();

// ---- Data + render ----
const RES_ORDER = [
  ["energy","Energy"],["minerals","Minerals"],["food","Food"],
  ["consumer_goods","Consumer Goods"],["alloys","Alloys"],["influence","Influence"],
  ["unity","Unity"],["physics_research","Physics"],["society_research","Society"],
  ["engineering_research","Engineering"],["rare_crystals","Rare Crystals"]
];
const CATCOLOR = {economy:"#46e0a0",military:"#ff7a8a",diplomacy:"#c98cff",research:"#46c6ff",
  expansion:"#ffd166",progression:"#8be9fd",identity:"#ffb454",origin:"#9af0c0",
  civics:"#9ab8ff",ascension:"#e08bff"};
let sigAdvice="", sigAsc="", sigRes="", lastRes={};
const sigPower = {military_power:"", economy_power:"", tech_power:""};

// ---- Empire-flavored color theme: the dashboard's accent shifts to match
// the player's authority/dominant ethic, like Stellaris' own ethic colors.
const THEMES = {
  hive:          {accent:"#ff5b6e", accent2:"#ff8a3c", rgb:"255,91,110"},
  machine:       {accent:"#8be9fd", accent2:"#5fa8ff", rgb:"139,233,253"},
  megacorp:      {accent:"#46e0a0", accent2:"#ffd166", rgb:"70,224,160"},
  militarist:    {accent:"#ff7a4d", accent2:"#ff5b6e", rgb:"255,122,77"},
  pacifist:      {accent:"#46e0a0", accent2:"#5fa8ff", rgb:"70,224,160"},
  xenophobe:     {accent:"#ff8a3c", accent2:"#ff5b6e", rgb:"255,138,60"},
  xenophile:     {accent:"#46e0c6", accent2:"#46c6ff", rgb:"70,224,198"},
  materialist:   {accent:"#46c6ff", accent2:"#6a7bff", rgb:"70,198,255"},
  spiritualist:  {accent:"#c98cff", accent2:"#9a6bff", rgb:"201,140,255"},
  authoritarian: {accent:"#ffd166", accent2:"#ffb454", rgb:"255,209,102"},
  egalitarian:   {accent:"#5fa8ff", accent2:"#46c6ff", rgb:"95,168,255"},
  default:       {accent:"#46c6ff", accent2:"#6a7bff", rgb:"70,198,255"},
};
const ETHIC_ORDER = ["militarist","pacifist","xenophobe","xenophile","materialist",
  "spiritualist","authoritarian","egalitarian"];
let lastThemeKey = "";

function pickTheme(identity){
  if(!identity) return ["default", THEMES.default];
  if(identity.authority === "auth_hive_mind") return ["hive", THEMES.hive];
  if(identity.authority === "auth_machine_intelligence") return ["machine", THEMES.machine];
  if(identity.authority === "auth_corporate") return ["megacorp", THEMES.megacorp];
  const ethics = identity.ethics || [];
  for(const key of ETHIC_ORDER) if(ethics.includes("ethic_fanatic_"+key)) return [key, THEMES[key]];
  for(const key of ETHIC_ORDER) if(ethics.includes("ethic_"+key)) return [key, THEMES[key]];
  return ["default", THEMES.default];
}

function applyEmpireTheme(d){
  const [key, t] = pickTheme(d.player && d.player.identity);
  if(key === lastThemeKey) return;
  lastThemeKey = key;
  const root = document.documentElement.style;
  root.setProperty("--accent", t.accent);
  root.setProperty("--accent2", t.accent2);
  root.setProperty("--accent-rgb", t.rgb);
}

function pulseFlash(el){
  if(!el) return;
  el.classList.remove("scan-flash");
  void el.offsetWidth; // restart the animation even if it's already applied
  el.classList.add("scan-flash");
}

function cardHTML(a, i){
  return `<div class="card ${a.priority}" style="animation-delay:${Math.min(i*55,500)}ms">
      <div class="top">
        <span class="badge ${a.priority}">${a.priority}</span>
        <span class="title">${esc(a.title)}</span>
        <span class="cat" style="--catc:${CATCOLOR[a.category]||'#888'}">${esc(a.category)}</span>
      </div>
      <div class="detail">${esc(a.detail)}</div>
    </div>`;
}

function fmt(n){ if(n===undefined||n===null) return "—";
  return Math.abs(n)>=10 ? Math.round(n).toLocaleString() : (Math.round(n*10)/10).toString(); }
function flowClass(n){ return n>0.5?"pos":(n<-0.5?"neg":"zero"); }
function flowStr(n){ if(n===undefined) return ""; const s=n>0?"+":""; return s+fmt(n); }
function esc(s){ return String(s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

async function loadCampaigns(){
  try{
    const d = await (await fetch("/api/campaigns",{cache:"no-store"})).json();
    if(!d.ok) return;
    const sel = document.getElementById("campaign");
    const cur = sel.value;
    sel.innerHTML = '<option value="">Auto — newest save</option>' +
      d.campaigns.map(c => `<option value="${esc(c.folder)}">${esc(c.empire)} — ${esc(c.date)}</option>`).join("");
    sel.value = d.selected || cur || "";
  }catch(e){}
}
document.getElementById("campaign").addEventListener("change", async (e) => {
  document.getElementById("status").textContent = "loading…";
  try{ const d = await (await fetch("/api/select?campaign="+encodeURIComponent(e.target.value),{cache:"no-store"})).json();
       sigAdvice=sigAsc=sigRes=""; sigPower.military_power=sigPower.economy_power=sigPower.tech_power="";
       render(d); }catch(err){}
});

async function tick(){
  try { render(await (await fetch("/api/advice",{cache:"no-store"})).json()); }
  catch(e){ document.getElementById("status").textContent = "server unreachable";
    document.getElementById("dot").style.background = "#ff5b6e"; }
}

function renderPowerTable(d, field, tableId, label){
  const emp = (d.empires||[]).filter(e => e.type==="default").sort((a,b)=> (b[field]||0)-(a[field]||0));
  const sig = JSON.stringify(emp.map(e=>[e.id,e[field]]));
  if(sig === sigPower[field]) return;
  sigPower[field] = sig;
  const max = emp.length ? (emp[0][field]||0) : 1;
  const rows = emp.map(e => {
    const you = e.id === d.player.id;
    const w = Math.max(2, 100*(e[field]||0)/(max||1));
    return `<tr class="${you?'you':''}">
      <td class="name">${esc(e.name)}${you?' ◄ you':''}</td>
      <td style="width:46%"><div class="bar"><span data-w="${w}"></span></div></td>
      <td class="num">${fmt(e[field])}</td></tr>`;
  }).join("");
  const table = document.getElementById(tableId);
  table.innerHTML = '<tr><th>Empire</th><th>'+label+'</th><th class="num">Score</th></tr>' + rows;
  requestAnimationFrame(()=>table.querySelectorAll(".bar > span")
    .forEach(s=> s.style.width = s.dataset.w + "%"));
}

function render(d){
  const dot = document.getElementById("dot");
  if(!d.ok){
    document.getElementById("status").innerHTML = '<span class="err">'+esc(d.error||"no data")+'</span>';
    dot.style.background = "#ffb454";
    document.getElementById("advice").innerHTML = '<div class="empty err">'+esc(d.error||"No save loaded yet.")+'</div>';
    return;
  }
  dot.style.background = "var(--good)";
  document.getElementById("status").textContent = "live";
  applyEmpireTheme(d);
  document.getElementById("empire").textContent = d.player.name || "—";
  document.getElementById("date").textContent = d.date || "—";
  const prof = document.getElementById("profile");
  const ptitle = d.profile && d.profile.title ? d.profile.title : "";
  prof.textContent = ptitle;
  prof.title = d.profile && d.profile.traits && d.profile.traits.length ? "Traits: " + d.profile.traits.join(", ") : "";
  prof.className = "profile" + (ptitle ? "" : " empty");
  const sel = document.getElementById("campaign");
  if(document.activeElement !== sel && d.campaign && [...sel.options].some(o=>o.value===d.campaign)) sel.value = d.campaign;

  // Split ascension/tradition strategy out into its own section.
  const ascList = d.advice.filter(a => a.category === "ascension");
  const mainList = d.advice.filter(a => a.category !== "ascension");

  // Main recommendations (only rebuild when changed → animations don't flicker).
  const sig = JSON.stringify(mainList);
  if(sig !== sigAdvice){
    sigAdvice = sig;
    document.getElementById("advcount").textContent = mainList.length ? mainList.length+" tips" : "";
    document.getElementById("advice").innerHTML =
      mainList.map(cardHTML).join("") || '<div class="empty">No advice — all clear.</div>';
    pulseFlash(document.getElementById("advice"));
  }

  // Ascension & Traditions section.
  const sigA = JSON.stringify(ascList);
  if(sigA !== sigAsc){
    sigAsc = sigA;
    document.getElementById("ascsection").style.display = ascList.length ? "" : "none";
    document.getElementById("asccount").textContent = ascList.length ? ascList.length+" tips" : "";
    document.getElementById("ascension").innerHTML = ascList.map(cardHTML).join("");
    if(ascList.length) pulseFlash(document.getElementById("ascension"));
  }

  // Resources
  const res = d.player.resources || {}, bal = d.player.balance || {};
  const sigR = JSON.stringify([res,bal]);
  if(sigR !== sigRes){
    sigRes = sigR;
    const rows = RES_ORDER.filter(([k]) => res[k]!==undefined).map(([k,label]) => {
      let flow = bal[k];
      if(k==="energy" && bal["trade"]!==undefined) flow = (bal["energy"]||0)+(bal["trade"]||0);
      const changed = lastRes[k]!==undefined && Math.round(lastRes[k])!==Math.round(res[k]);
      return `<tr><td>${label}</td>
        <td class="num ${changed?'flash':''}">${fmt(res[k])}</td>
        <td class="num ${flowClass(flow||0)}">${flowStr(flow)}</td></tr>`;
    }).join("");
    document.getElementById("restable").innerHTML =
      '<tr><th>Resource</th><th class="num">Stock</th><th class="num">/mo</th></tr>' + rows;
    lastRes = {...res};
  }

  // Power comparison (military / economy / tech share the same ranked-bar layout)
  renderPowerTable(d, "military_power", "powertable", "Fleet power");
  renderPowerTable(d, "economy_power", "econpowertable", "Economy power");
  renderPowerTable(d, "tech_power", "techpowertable", "Tech power");

  const dlc = d.dlc && d.dlc.names ? d.dlc.names.join(", ") : "—";
  document.getElementById("foot").textContent =
    "Campaign: " + (d.campaign||"?") + " · save " + (d.save_file||"?") +
    " · DLC detected: " + dlc + " · updates automatically on each autosave.";
}

// ---- Empire Builder ----
let currentGoal = null, buildsLoaded = false;

let fleetTimer = null;
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  const v = t.dataset.view;
  document.getElementById("view-live").style.display = v === "live" ? "" : "none";
  document.getElementById("view-fleet").style.display = v === "fleet" ? "" : "none";
  document.getElementById("view-builder").style.display = v === "builder" ? "" : "none";
  if(v === "builder" && !buildsLoaded){ buildGoalButtons(); loadBuilds(); }
  // refresh the fleet only while its tab is open (the scan is expensive)
  clearInterval(fleetTimer);
  if(v === "fleet"){ loadFleet(); fleetTimer = setInterval(loadFleet, 20000); }
}));

async function loadFleet(){
  const body = document.getElementById("fleetbody");
  if(!body.dataset.loaded) body.innerHTML = '<div class="empty">Analyzing your fleet… (scanning every ship can take a few seconds)</div>';
  try {
    const d = await (await fetch("/api/fleet", {cache:"no-store"})).json();
    renderFleet(d);
  } catch(e){
    body.innerHTML = '<div class="empty err">Could not analyze fleet.</div>';
  }
}

function renderFleet(d){
  const head = document.getElementById("fleethead");
  const body = document.getElementById("fleetbody");
  if(!d.ok){
    head.innerHTML = "";
    body.innerHTML = '<div class="empty err">'+esc(d.error||"No fleet data.")+'</div>';
    return;
  }
  body.dataset.loaded = "1";
  head.innerHTML = `
    <div class="doctrine">${esc(d.doctrine||"")}</div>
    <div class="stat">Tier: <b>${esc((d.tier||"").replace(/^./,c=>c.toUpperCase()))}</b>
      &nbsp;·&nbsp; Warships: <b>${d.warships}</b>
      &nbsp;·&nbsp; Naval capacity in use: <b>${d.used_naval_capacity}</b>
      &nbsp;·&nbsp; This family: <b>${d.current_naval_capacity}</b> used /
      <b>${d.recommended_naval_capacity}</b> recommended
      &nbsp;·&nbsp; costs from <b>${esc(d.data_source||"")}</b></div>`;

  const maxRec = Math.max(1, ...d.rows.map(r => Math.max(r.current, r.recommended)));
  const rows = d.rows.map(r => {
    let act = '<span class="act ok">OK</span>';
    if(r.delta > 0) act = `<span class="act build">Build +${r.delta}</span>`;
    else if(r.delta < 0) act = `<span class="act cut">Retire/upgrade ${-r.delta}</span>`;
    const w = Math.round(100*r.recommended/maxRec);
    return `<tr>
      <td class="hull">${esc(r.class)}</td>
      <td class="n">${r.current}</td>
      <td class="n">${r.recommended}<div class="recbar"><span style="width:${w}%"></span></div></td>
      <td>${act}</td>
    </tr>`;
  }).join("");

  const notes = (d.notes||[]).map(n => `<div class="why">${esc(n)}</div>`).join("");
  body.innerHTML = `
    <div class="build fleetcard">
      <table class="ftable">
        <tr><th>Hull class</th><th class="n">You have</th><th class="n">Recommended</th><th>Action</th></tr>
        ${rows}
      </table>
    </div>
    ${notes}`;
}

function buildGoalButtons(){
  const goals = ["All","Tall","Wide","Tech","Military","Trade","Economy","Bio","Gestalt"];
  document.getElementById("goalfilter").innerHTML = goals.map(g =>
    `<button class="gbtn ${(!currentGoal&&g==='All')||currentGoal===g?'active':''}" data-goal="${g}">${g}</button>`).join("");
  document.querySelectorAll(".gbtn").forEach(b => b.addEventListener("click", () => {
    currentGoal = b.dataset.goal === "All" ? null : b.dataset.goal;
    document.querySelectorAll(".gbtn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    loadBuilds();
  }));
}

async function loadBuilds(){
  buildsLoaded = true;
  try {
    const url = "/api/builds" + (currentGoal ? "?goal="+encodeURIComponent(currentGoal) : "");
    const d = await (await fetch(url, {cache:"no-store"})).json();
    if(!d.ok){ document.getElementById("builds").innerHTML = '<div class="empty err">'+esc(d.error||"error")+'</div>'; return; }
    const dlcEl = document.getElementById("builderdlc");
    dlcEl.innerHTML = "Showing empires you can build with: <b>" + esc((d.owned_dlc||[]).join(", ")||"Base game") + "</b>";
    const html = d.builds.map((b,i) => {
      const isDlc = b.dlc_label !== "Base game";
      const row = (label,val) => `<tr><th>${label}</th><td>${val}</td></tr>`;
      return `<div class="build" style="animation-delay:${Math.min(i*45,400)}ms">
        <div class="build-top">
          <span class="build-name">${esc(b.name)}</span>
          <span class="dlcbadge ${isDlc?'dlc':''}">${esc(b.dlc_label)}</span>
        </div>
        <div class="gchips">${b.goals.map(g=>`<span class="gchip">${esc(g)}</span>`).join("")}</div>
        <table>
          ${row("Ethics", "<b>"+b.ethics.map(esc).join("</b>, <b>")+"</b>")}
          ${row("Authority", esc(b.authority))}
          ${row("Civics", b.civics.map(esc).join(", "))}
          ${row("Origin", "<b>"+esc(b.origin)+"</b>")}
          ${row("Traits", b.traits.map(esc).join(", "))}
          ${row("Ascension", esc(b.ascension))}
        </table>
        <div class="why">${esc(b.why)}</div>
        ${b.checked ? (b.verified
          ? '<div class="vbadge ok">✓ Verified usable in your game</div>'
          : '<div class="vbadge bad">⚠ Not fully usable: ' + esc((b.issues||[]).join("; ")) + '</div>')
          : ''}
      </div>`;
    }).join("");
    document.getElementById("builds").innerHTML = html || '<div class="empty">No builds match this filter.</div>';
  } catch(e){
    document.getElementById("builds").innerHTML = '<div class="empty err">Could not load builds.</div>';
  }
}

loadCampaigns();
setInterval(loadCampaigns, 30000);
tick();
setInterval(tick, 5000);
</script>
</body>
</html>
